<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfumes Blue Essence</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: #0a1f44;
    }

    header {
      background-color: #0a1f44;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #1e3a8a;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      background: linear-gradient(to right, #1e3a8a, #3b82f6);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .productos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 250px;
      padding: 15px;
      text-align: center;
      background-color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .precio {
      color: #1e3a8a;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      background-color: #1e3a8a;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0a1f44;
    }

    footer {
      background-color: #0a1f44;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>A&G Essence</h1>
  <p>Perfumes exclusivos</p>
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Productos</a>
  <a href="#">Contacto</a>
</nav>

<section class="hero">
  <h2>Descubrí tu aroma ideal</h2>
  <p>Elegancia y frescura en cada fragancia</p>
</section>

<section class="productos">

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Perfume 1">
    <h3>Ocean Blue</h3>
    <p class="precio">$45 USD</p>
    <button>Comprar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Perfume 2">
    <h3>Sky Fresh</h3>
    <p class="precio">$50 USD</p>
    <button>Comprar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Perfume 3">
    <h3>Night Elegance</h3>
    <p class="precio">$60 USD</p>
    <button>Comprar</button>
  </div>

</section>

<footer>
  <p>© 2026 Blue Essence - Todos los derechos reservados</p>
</footer>

</body>
</html>
